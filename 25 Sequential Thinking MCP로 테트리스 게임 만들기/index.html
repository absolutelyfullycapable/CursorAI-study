<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>테트리스 | Sequential Thinking MCP</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <header class="hero">
      <p class="eyebrow">Sequential Thinking MCP</p>
      <h1>TETRIS</h1>
      <p class="subtitle">블록을 쌓고, 줄을 지우고, 최고 기록을 갱신하세요</p>
    </header>

    <main class="layout">
      <section class="board-panel" aria-label="게임 보드">
        <canvas id="board" width="300" height="600"></canvas>
        <div class="overlay" id="overlay" hidden>
          <p class="overlay-title" id="overlayTitle">일시정지</p>
          <p class="overlay-text" id="overlayText">P 키 또는 재개 버튼을 누르세요</p>
        </div>
      </section>

      <aside class="side">
        <div class="card">
          <h2>NEXT</h2>
          <canvas id="next" width="120" height="120"></canvas>
        </div>

        <div class="card stats">
          <div class="stat">
            <span class="label">SCORE</span>
            <span class="value" id="score">0</span>
          </div>
          <div class="stat">
            <span class="label">LEVEL</span>
            <span class="value" id="level">1</span>
          </div>
          <div class="stat">
            <span class="label">LINES</span>
            <span class="value" id="lines">0</span>
          </div>
          <div class="stat">
            <span class="label">BEST</span>
            <span class="value" id="best">0</span>
          </div>
        </div>

        <div class="card actions">
          <button type="button" id="pauseBtn" class="btn primary">일시정지</button>
          <button type="button" id="restartBtn" class="btn">다시 하기</button>
        </div>

        <div class="card help">
          <h2>조작법</h2>
          <ul>
            <li><kbd>←</kbd> <kbd>→</kbd> 이동</li>
            <li><kbd>↓</kbd> 소프트 드롭</li>
            <li><kbd>↑</kbd> / <kbd>X</kbd> 회전</li>
            <li><kbd>Space</kbd> 하드 드롭</li>
            <li><kbd>P</kbd> 일시정지</li>
            <li><kbd>R</kbd> 다시 하기</li>
          </ul>
        </div>
      </aside>
    </main>

    <section class="touch-controls" aria-label="터치 조작">
      <button type="button" data-action="left" aria-label="왼쪽">←</button>
      <button type="button" data-action="rotate" aria-label="회전">↻</button>
      <button type="button" data-action="right" aria-label="오른쪽">→</button>
      <button type="button" data-action="down" aria-label="아래로">↓</button>
      <button type="button" data-action="drop" class="wide" aria-label="하드 드롭">DROP</button>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
