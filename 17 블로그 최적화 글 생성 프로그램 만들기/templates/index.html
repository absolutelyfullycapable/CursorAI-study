<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>블로그 최적화 — AI 글 생성</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            night: {
              950: "#0a0c10",
              900: "#12151c",
              800: "#1c212b",
              700: "#2a3140",
              500: "#5c6578",
              400: "#8b93a5",
              300: "#b6bdc9",
            },
            paper: {
              50: "#f7f8fa",
              100: "#eef0f4",
              200: "#dde1e9",
            },
            signal: {
              400: "#6ee7c5",
              500: "#34d3a5",
              600: "#1fb889",
            },
          },
          fontFamily: {
            display: ['"Sora"', "sans-serif"],
            sans: ['"IBM Plex Sans KR"', "sans-serif"],
          },
          keyframes: {
            fadeUp: {
              "0%": { opacity: "0", transform: "translateY(18px)" },
              "100%": { opacity: "1", transform: "translateY(0)" },
            },
            drift: {
              "0%, 100%": { transform: "translate(0, 0) scale(1)" },
              "50%": { transform: "translate(12px, -8px) scale(1.04)" },
            },
            shimmer: {
              "0%": { backgroundPosition: "200% 0" },
              "100%": { backgroundPosition: "-200% 0" },
            },
          },
          animation: {
            fadeUp: "fadeUp 0.65s cubic-bezier(0.22, 1, 0.36, 1) both",
            "fadeUp-2": "fadeUp 0.75s cubic-bezier(0.22, 1, 0.36, 1) 0.08s both",
            "fadeUp-3": "fadeUp 0.75s cubic-bezier(0.22, 1, 0.36, 1) 0.16s both",
            drift: "drift 14s ease-in-out infinite",
            shimmer: "shimmer 1.8s linear infinite",
          },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --night: #12151c;
      --signal: #34d3a5;
    }

    body {
      background: #e8ebf1;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .scene {
      background:
        linear-gradient(165deg, #f4f6f9 0%, #e6eaf1 42%, #d9dee8 100%);
    }

    .orb {
      position: absolute;
      border-radius: 9999px;
      filter: blur(64px);
      pointer-events: none;
    }

    .orb-a {
      width: 42vw;
      height: 42vw;
      max-width: 520px;
      max-height: 520px;
      top: -12%;
      left: -8%;
      background: rgba(52, 211, 165, 0.22);
      animation: drift 14s ease-in-out infinite;
    }

    .orb-b {
      width: 36vw;
      height: 36vw;
      max-width: 440px;
      max-height: 440px;
      top: 8%;
      right: -10%;
      background: rgba(90, 110, 150, 0.18);
      animation: drift 18s ease-in-out infinite reverse;
    }

    .grid-mask {
      background-image:
        linear-gradient(rgba(18, 21, 28, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(18, 21, 28, 0.04) 1px, transparent 1px);
      background-size: 56px 56px;
      mask-image: radial-gradient(ellipse 70% 55% at 50% 20%, black 20%, transparent 75%);
    }

    .glass {
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(18px) saturate(1.2);
      border: 1px solid rgba(255, 255, 255, 0.65);
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.8) inset,
        0 28px 64px -40px rgba(18, 21, 28, 0.45);
    }

    .field {
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    .field:focus {
      border-color: rgba(52, 211, 165, 0.55);
      box-shadow: 0 0 0 3px rgba(52, 211, 165, 0.15);
      background: rgba(255, 255, 255, 0.92);
    }

    #dropzone.dragover {
      border-color: rgba(52, 211, 165, 0.7);
      background: rgba(52, 211, 165, 0.08);
    }

    .style-btn {
      flex: 1;
      border: 1px solid rgba(18, 21, 28, 0.1);
      background: rgba(255, 255, 255, 0.45);
      color: #5c6578;
      transition: background 0.2s, border-color 0.2s, color 0.2s, transform 0.15s;
    }

    .style-btn:hover {
      border-color: rgba(18, 21, 28, 0.18);
      color: #2a3140;
    }

    .style-btn.active {
      background: #12151c;
      border-color: #12151c;
      color: #f7f8fa;
      box-shadow: 0 10px 24px -16px rgba(18, 21, 28, 0.7);
    }

    .btn-primary {
      background: linear-gradient(135deg, #1c212b 0%, #12151c 100%);
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
      box-shadow: 0 10px 28px -14px rgba(18, 21, 28, 0.7);
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 14px 32px -12px rgba(18, 21, 28, 0.75);
    }

    .btn-primary:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .status-loading {
      background: linear-gradient(90deg, #8b93a5 0%, #34d3a5 50%, #8b93a5 100%);
      background-size: 200% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: shimmer 1.8s linear infinite;
    }

    .prose-post h1 {
      font-family: "Sora", sans-serif;
      font-size: 1.55rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #12151c;
      margin: 0 0 1.1rem;
      line-height: 1.35;
    }

    .prose-post h2 {
      font-size: 1.05rem;
      font-weight: 700;
      color: #1c212b;
      margin: 1.5rem 0 0.55rem;
      letter-spacing: -0.01em;
    }

    .prose-post p {
      margin: 0.7rem 0;
      line-height: 1.8;
      color: #2a3140;
      font-size: 0.95rem;
    }

    .prose-post ul {
      margin: 0.55rem 0 0.55rem 1.15rem;
      list-style: disc;
      color: #2a3140;
    }

    .prose-post li {
      margin: 0.3rem 0;
      line-height: 1.7;
      font-size: 0.95rem;
    }

    .prose-post strong {
      color: #12151c;
      font-weight: 600;
    }
  </style>
</head>
<body class="font-sans text-night-900 antialiased">
  <div class="scene relative min-h-screen">
    <div class="orb orb-a"></div>
    <div class="orb orb-b"></div>
    <div class="grid-mask pointer-events-none absolute inset-0"></div>

    <div class="relative mx-auto w-full max-w-2xl px-5 pb-28 pt-14 sm:px-6 sm:pt-16">
      <header class="mb-9 animate-fadeUp">
        <p class="font-display text-[2.35rem] font-extrabold leading-none tracking-[-0.04em] text-night-950 sm:text-5xl">
          블로그 최적화
        </p>
        <h1 class="mt-5 text-lg font-medium leading-snug text-night-700 sm:text-xl">
          키워드, 나의 관점, 자료를 넣으면 바로 발행할 수 있는 글이 됩니다
        </h1>
        <p class="mt-3 max-w-md text-sm leading-relaxed text-night-500">
          관점을 중심에 두고, 메모·통계·인용으로 사실 기반 글을 만듭니다.
          <span class="ml-1 inline-flex items-center rounded-full bg-night-900/5 px-2 py-0.5 text-[11px] font-medium text-night-700">
            {{ model }}
          </span>
        </p>
      </header>

      <form id="generate-form" class="glass animate-fadeUp-2 rounded-[1.35rem] p-6 sm:p-8">
        <div>
          <div class="flex items-baseline justify-between gap-3">
            <label class="text-sm font-semibold text-night-800" for="keyword">키워드</label>
            <span class="text-[11px] text-night-400">필수</span>
          </div>
          <input
            id="keyword"
            name="keyword"
            type="text"
            required
            placeholder="예: 재택근무 생산성"
            class="field mt-2.5 w-full rounded-2xl border border-night-900/8 bg-white/70 px-4 py-3.5 text-[15px] text-night-900 outline-none placeholder:text-night-400"
          />
        </div>

        <div class="mt-7">
          <div class="flex items-baseline justify-between gap-3">
            <label class="text-sm font-semibold text-night-800" for="viewpoint">나의 관점</label>
            <span id="viewpoint-count" class="text-[11px] tabular-nums text-night-400">0 / {{ max_viewpoint }}</span>
          </div>
          <textarea
            id="viewpoint"
            name="viewpoint"
            rows="3"
            required
            maxlength="{{ max_viewpoint }}"
            placeholder="예: 미니멀은 물건을 줄이는 게 아니라, 매일 쓰는 것만 남기는 선택이다."
            class="field mt-2.5 w-full resize-none rounded-2xl border border-night-900/8 bg-white/70 px-4 py-3.5 text-sm leading-relaxed text-night-900 outline-none placeholder:text-night-400"
          ></textarea>
          <p class="mt-1.5 text-[11px] text-night-400">최대 {{ max_viewpoint }}자 · 글의 톤과 주장의 중심이 됩니다</p>
        </div>

        <div class="mt-7">
          <div class="flex items-baseline justify-between gap-3">
            <span class="text-sm font-semibold text-night-800">글 스타일</span>
            <span class="text-[11px] text-night-400">하나를 선택</span>
          </div>
          <div class="mt-2.5 flex gap-2" role="group" aria-label="글 스타일">
            <button
              type="button"
              class="style-btn active rounded-2xl px-4 py-3 text-sm font-semibold"
              data-style="friendly"
            >
              친근하게
            </button>
            <button
              type="button"
              class="style-btn rounded-2xl px-4 py-3 text-sm font-semibold"
              data-style="serious"
            >
              진지하게
            </button>
          </div>
          <input type="hidden" id="style" name="style" value="friendly" />
        </div>

        <div class="mt-7">
          <div class="flex items-baseline justify-between gap-3">
            <label class="text-sm font-semibold text-night-800" for="material">관련 자료</label>
            <span class="text-[11px] text-night-400">붙여넣기 또는 파일</span>
          </div>
          <textarea
            id="material"
            name="material"
            rows="7"
            placeholder="취재 메모, 수치, 인용구, 핵심 포인트를 자유롭게 붙여넣으세요."
            class="field mt-2.5 w-full resize-y rounded-2xl border border-night-900/8 bg-white/70 px-4 py-3.5 text-sm leading-relaxed text-night-900 outline-none placeholder:text-night-400"
          ></textarea>

          <div
            id="dropzone"
            class="mt-3 flex cursor-pointer items-center gap-4 rounded-2xl border border-dashed border-night-900/12 bg-white/35 px-4 py-4 transition hover:border-signal-500/40 hover:bg-white/55"
          >
            <div class="flex h-10 w-10 shrink-0 items-center justify-center rounded-xl bg-night-900 text-signal-400">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M12 16V4m0 0l-4 4m4-4l4 4M4 16.5V18a2 2 0 002 2h12a2 2 0 002-2v-1.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <div class="min-w-0 text-left">
              <p class="text-sm font-medium text-night-800">.txt 파일 업로드</p>
              <p id="file-label" class="mt-0.5 truncate text-xs text-night-400">클릭하거나 파일을 끌어다 놓으세요</p>
            </div>
            <input id="material_file" name="material_file" type="file" accept=".txt,text/plain" class="hidden" />
          </div>
        </div>

        <label class="mt-6 flex cursor-pointer items-center gap-2.5 text-sm text-night-500">
          <input
            id="save"
            name="save"
            type="checkbox"
            checked
            class="h-4 w-4 rounded border-night-900/20 text-signal-600 focus:ring-signal-500/30"
          />
          생성 후 <span class="font-medium text-night-700">posts/</span> 폴더에 저장
        </label>

        <div class="mt-8 flex flex-wrap items-center gap-4">
          <button id="submit-btn" type="submit" class="btn-primary rounded-2xl px-7 py-3.5 text-sm font-semibold text-paper-50">
            글 생성하기
          </button>
          <p id="status" class="text-sm text-night-400"></p>
        </div>
      </form>

      <section id="result-section" class="mt-11 hidden animate-fadeUp-3">
        <div class="mb-5 flex flex-wrap items-end justify-between gap-3">
          <div>
            <h2 class="font-display text-xl font-bold tracking-tight text-night-950">생성된 글</h2>
            <p id="result-meta" class="mt-1.5 max-w-md truncate text-xs text-night-400"></p>
          </div>
          <div class="flex gap-2">
            <button
              id="copy-btn"
              type="button"
              class="rounded-xl border border-night-900/8 bg-white/60 px-3.5 py-2 text-xs font-semibold text-night-700 transition hover:bg-white"
            >
              복사
            </button>
            <button
              id="download-btn"
              type="button"
              class="rounded-xl border border-night-900/8 bg-white/60 px-3.5 py-2 text-xs font-semibold text-night-700 transition hover:bg-white"
            >
              .md 저장
            </button>
          </div>
        </div>
        <article id="result-html" class="glass prose-post rounded-[1.35rem] p-6 sm:p-8"></article>
        <pre id="result-raw" class="hidden"></pre>
      </section>
    </div>
  </div>

  <script>
    const form = document.getElementById("generate-form");
    const dropzone = document.getElementById("dropzone");
    const fileInput = document.getElementById("material_file");
    const fileLabel = document.getElementById("file-label");
    const viewpointInput = document.getElementById("viewpoint");
    const viewpointCount = document.getElementById("viewpoint-count");
    const statusEl = document.getElementById("status");
    const submitBtn = document.getElementById("submit-btn");
    const resultSection = document.getElementById("result-section");
    const resultHtml = document.getElementById("result-html");
    const resultRaw = document.getElementById("result-raw");
    const resultMeta = document.getElementById("result-meta");
    const maxViewpoint = {{ max_viewpoint }};
    let latestPost = "";
    let latestKeyword = "";

    function updateViewpointCount() {
      const len = viewpointInput.value.length;
      viewpointCount.textContent = `${len} / ${maxViewpoint}`;
      viewpointCount.className =
        len >= maxViewpoint
          ? "text-[11px] tabular-nums text-signal-600"
          : "text-[11px] tabular-nums text-night-400";
    }
    viewpointInput.addEventListener("input", updateViewpointCount);
    updateViewpointCount();

    const styleInput = document.getElementById("style");
    const styleButtons = document.querySelectorAll(".style-btn");
    styleButtons.forEach((btn) => {
      btn.addEventListener("click", () => {
        styleButtons.forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        styleInput.value = btn.dataset.style;
      });
    });

    dropzone.addEventListener("click", () => fileInput.click());
    dropzone.addEventListener("dragover", (e) => {
      e.preventDefault();
      dropzone.classList.add("dragover");
    });
    dropzone.addEventListener("dragleave", () => dropzone.classList.remove("dragover"));
    dropzone.addEventListener("drop", (e) => {
      e.preventDefault();
      dropzone.classList.remove("dragover");
      if (e.dataTransfer.files.length) {
        fileInput.files = e.dataTransfer.files;
        fileLabel.textContent = e.dataTransfer.files[0].name;
      }
    });
    fileInput.addEventListener("change", () => {
      fileLabel.textContent = fileInput.files[0]
        ? fileInput.files[0].name
        : "클릭하거나 파일을 끌어다 놓으세요";
    });

    function escapeHtml(text) {
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function markdownLite(md) {
      const lines = md.split("\n");
      const html = [];
      let inList = false;

      const flushList = () => {
        if (inList) {
          html.push("</ul>");
          inList = false;
        }
      };

      for (const line of lines) {
        if (line.startsWith("# ")) {
          flushList();
          html.push(`<h1>${escapeHtml(line.slice(2))}</h1>`);
        } else if (line.startsWith("## ")) {
          flushList();
          html.push(`<h2>${escapeHtml(line.slice(3))}</h2>`);
        } else if (line.startsWith("- ") || line.startsWith("* ")) {
          if (!inList) {
            html.push("<ul>");
            inList = true;
          }
          html.push(`<li>${escapeHtml(line.slice(2))}</li>`);
        } else if (line.trim() === "") {
          flushList();
        } else {
          flushList();
          const withBold = escapeHtml(line).replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
          html.push(`<p>${withBold}</p>`);
        }
      }
      flushList();
      return html.join("\n");
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      submitBtn.disabled = true;
      statusEl.className = "text-sm status-loading";
      statusEl.textContent = "글을 작성하는 중…";
      resultSection.classList.add("hidden");

      const data = new FormData(form);
      data.set("save", document.getElementById("save").checked ? "1" : "0");

      try {
        const res = await fetch("/api/generate", { method: "POST", body: data });
        const json = await res.json();
        if (!json.ok) throw new Error(json.error || "생성에 실패했습니다.");

        latestPost = json.post;
        latestKeyword = json.keyword;
        resultRaw.textContent = json.post;
        resultHtml.innerHTML = markdownLite(json.post);
        resultMeta.textContent = [
          json.style ? `스타일 ${json.style}` : null,
          json.saved_path ? `저장됨 · ${json.saved_path}` : `모델 ${json.model} · 저장하지 않음`,
        ]
          .filter(Boolean)
          .join(" · ");
        resultSection.classList.remove("hidden");
        statusEl.className = "text-sm text-signal-600";
        statusEl.textContent = "완료";
        resultSection.scrollIntoView({ behavior: "smooth", block: "start" });
      } catch (err) {
        statusEl.className = "text-sm text-red-600";
        statusEl.textContent = err.message || "오류가 발생했습니다.";
      } finally {
        submitBtn.disabled = false;
      }
    });

    document.getElementById("copy-btn").addEventListener("click", async () => {
      if (!latestPost) return;
      await navigator.clipboard.writeText(latestPost);
      statusEl.className = "text-sm text-signal-600";
      statusEl.textContent = "클립보드에 복사했습니다.";
    });

    document.getElementById("download-btn").addEventListener("click", () => {
      if (!latestPost) return;
      const blob = new Blob([latestPost + "\n"], { type: "text/markdown;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      const safe = (latestKeyword || "blog").replace(/[\\/:*?"<>|]/g, "_").replace(/\s+/g, "_");
      a.href = url;
      a.download = `${safe}.md`;
      a.click();
      URL.revokeObjectURL(url);
    });
  </script>
</body>
</html>
